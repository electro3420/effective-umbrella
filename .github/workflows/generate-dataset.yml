name: Generate 100k Science-Heavy Dataset (CPU-only, Hosted Runner)

on:
  workflow_dispatch:          # Run manually from Actions tab
  schedule:
    - cron: '0 2 * * *'       # Optional: daily at 2 AM UTC (re-run until 100k)

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # Max 6 hours

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Free up disk space (prevent out-of-disk errors)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Run batch generation (real-time streaming logs)
        run: python generate_science_dataset.py

      - name: Commit and push updated dataset + progress
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add dataset_output/
          git commit -m "Update science-heavy dataset - $(date '+%Y-%m-%d %H:%M') [batch run]" || echo "No changes"
          git push
        continue-on-error: true

      - name: Upload latest dataset as artifact
        uses: actions/upload-artifact@v4
        with:
          name: science-heavy-dataset-batch
          path: dataset_output/*.jsonl
          retention-days: 14
